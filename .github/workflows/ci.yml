name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PIP_VERSION: "24.3.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade "pip==${PIP_VERSION}"
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy app

  test:
    name: Tests (pytest + PostgreSQL)
    runs-on: ubuntu-24.04
    needs: lint
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || format('pg-{0}', github.run_id) }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'appdb_test' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || format('pg-{0}', github.run_id) }}
      POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'appdb_test' }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      INSTANCE_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade "pip==${PIP_VERSION}"
          pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  compose-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-24.04
    needs: test
    env:
      POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || format('smoke-{0}', github.run_id) }}
      POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'appdb' }}
      LB_PORT: "8080"
      APP_ENV: production
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render .env from job env
        run: |
          umask 077
          {
            echo "POSTGRES_USER=${POSTGRES_USER}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DB=${POSTGRES_DB}"
            echo "LB_PORT=${LB_PORT}"
            echo "APP_ENV=${APP_ENV}"
            echo "LOG_LEVEL=${LOG_LEVEL}"
          } > .env

      - name: Build and start stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Probe load balancer
        run: |
          set -euxo pipefail
          curl --fail --silent "http://localhost:${LB_PORT}/api/v1/healthz"
          curl --fail --silent "http://localhost:${LB_PORT}/api/v1/readyz"

          for _ in $(seq 1 12); do
            curl -s -o /dev/null \
              -w '%{http_code} %header{x-served-by}\n' \
              "http://localhost:${LB_PORT}/api/v1/healthz"
          done | sort | uniq -c

      - name: CRUD smoke
        run: |
          set -euxo pipefail
          payload="$(printf '{"name":"smoke-%s","quantity":1}' "${GITHUB_RUN_ID}")"
          curl --fail --silent -X POST \
            "http://localhost:${LB_PORT}/api/v1/items" \
            -H 'content-type: application/json' \
            -d "${payload}"
          curl --fail --silent "http://localhost:${LB_PORT}/api/v1/items?limit=5"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-24.04
    needs: compose-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

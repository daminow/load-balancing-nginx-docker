worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    reset_timedout_connection on;

    default_type application/json;

    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"rt":$request_time,'
            '"urt":"$upstream_response_time",'
            '"bytes":$body_bytes_sent,'
            '"ua":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml+rss
        text/css
        text/plain
        text/xml;

    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=api_cc:10m;

    upstream api_backend {
        least_conn;
        server api1:8000 max_fails=3 fail_timeout=10s;
        server api2:8000 max_fails=3 fail_timeout=10s;
        server api3:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-XSS-Protection "0" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        location = /lb-health {
            access_log off;
            return 200 "{\"status\":\"ok\"}";
        }

        location /api/ {
            limit_req zone=api_rl burst=40 nodelay;
            limit_conn api_cc 50;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            add_header X-Upstream $upstream_addr always;
            add_header X-Upstream-Status $upstream_status always;
        }

        location = /docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.json {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            return 404 '{"detail":"Not Found"}';
        }
    }
}
